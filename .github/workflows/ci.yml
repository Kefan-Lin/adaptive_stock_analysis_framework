name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Repo uses PEP 585 builtin generics (list[...]), so 3.9+ only.
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Show versions
        run: |
          python --version
          bash --version | head -1

      - name: Install test dependencies
        run: pip install pyyaml

      - name: Unit + contract + e2e tests
        run: python -m unittest discover -s tests -p 'test_*.py' -v

      - name: Repository structure validation
        run: python scripts/validate_repo.py --profile full

      - name: Install scripts e2e
        run: bash tests/test_install.sh

  inflection-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package dependencies
        run: pip install -r inflection_discovery/requirements.txt pytest pyyaml
      - name: Package tests (offline subset)
        run: python -m pytest inflection_discovery/tests tests/test_contract.py -v
