<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Inflection Discovery — Dashboard</title>
<style>
  :root { --fg:#0f172a; --mut:#64748b; --line:#e2e8f0; --bg:#fff; --soft:#f8fafc; --acc:#2563eb; }
  @media (prefers-color-scheme:dark){:root{--fg:#e5e7eb;--mut:#9ca3af;--line:#27303f;--bg:#0b0f17;--soft:#111827;--acc:#60a5fa;}}
  *{box-sizing:border-box} body{margin:0;font-family:-apple-system,Segoe UI,Roboto,"PingFang SC","Microsoft YaHei",sans-serif;color:var(--fg);background:var(--bg)}
  header{padding:16px 22px 0}
  h1{font-size:19px;margin:0 0 2px} .sub{color:var(--mut);font-size:12.5px;margin:0 0 12px}
  nav{display:flex;gap:6px;flex-wrap:wrap;border-bottom:1px solid var(--line);padding:0 22px}
  .tab{appearance:none;background:none;border:none;border-bottom:2px solid transparent;color:var(--mut);
    font-size:13.5px;padding:9px 12px;cursor:pointer;font-family:inherit}
  .tab:hover{color:var(--fg)} .tab.on{color:var(--acc);border-bottom-color:var(--acc);font-weight:600}
  .docs{margin-left:auto;display:flex;gap:14px;align-items:center;font-size:12.5px}
  .docs a{color:var(--mut);text-decoration:none} .docs a:hover{color:var(--acc)}
  iframe{width:100%;height:calc(100vh - 112px);border:none;background:var(--bg)}
</style></head>
<body>
  <header>
    <h1>Inflection Discovery — results dashboard</h1>
    <p class="sub">Earnings / narrative turnaround finder · point-in-time backtest (discrimination probe) + live discovery</p>
  </header>
  <nav>
    <button class="tab on" data-src="backtest.html">Backtest metrics</button>
    <button class="tab" data-src="price_curves.html">US price curves</button>
    <button class="tab" data-src="ashare_curves.html">A-share curves</button>
    <span class="docs">
      <a href="comparison-report.md">comparison report ↗</a>
      <a href="akshare-integration.md">akshare notes ↗</a>
      <a href="../docs/plans/2026-06-28-inflection-discovery-design.md">design spec ↗</a>
    </span>
  </nav>
  <iframe id="view" src="backtest.html" title="report view"></iframe>
  <script>
    const view = document.getElementById('view');
    document.querySelectorAll('.tab').forEach(function (b) {
      b.addEventListener('click', function () {
        document.querySelectorAll('.tab').forEach(function (x) { x.classList.remove('on'); });
        b.classList.add('on');
        view.src = b.dataset.src;
      });
    });
  </script>
</body></html>
